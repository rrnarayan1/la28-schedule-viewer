        let currentData = [...data];
        let sortDirection = {};

        const columns = Object.keys(data[0]);
        const headerRow = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');

        // Create headers
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            th.className = 'sort-icon';
            th.onclick = () => sortTable(col);
            headerRow.appendChild(th);
            sortDirection[col] = 1; // 1 for asc, -1 for desc
        });

        function renderTable(displayData) {
            tableBody.innerHTML = '';
            displayData.forEach(row => {
                const tr = document.createElement('tr');
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = row[col];
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = data.filter(row => {
                return columns.some(col => String(row[col]).toLowerCase().includes(query));
            });
            currentData = filtered;
            renderTable(currentData);
        }

        function sortTable(column) {
            const direction = sortDirection[column];
            currentData.sort((a, b) => {
                const valA = a[column];
                const valB = b[column];
                
                if (typeof valA === 'number' && typeof valB === 'number') {
                    return (valA - valB) * direction;
                }
                return String(valA).localeCompare(String(valB), undefined, {numeric: true}) * direction;
            });
            
            sortDirection[column] *= -1; // Toggle direction
            renderTable(currentData);
        }

        // Initial render
        renderTable(data);
